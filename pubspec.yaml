# ============================================================
# ARQUIVO: pubspec.yaml
# DESCRIÇÃO: O "cardápio" do seu projeto.
# Aqui você lista o nome do app, a versão, e as
# bibliotecas externas ("pacotes") que você vai usar.
# O Flutter lê esse arquivo e baixa tudo automaticamente.
# ============================================================

name: sida_app
description: App de acessibilidade - transcrição de voz para comunicação com surdos
publish_to: 'none' # Não publicar na loja pública por enquanto
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0' # Versão mínima do Dart necessária

# ── DEPENDÊNCIAS ─────────────────────────────────────────────
# São as "ferramentas prontas" que você vai usar.
# Em vez de criar tudo do zero, você usa o que outros já fizeram.
dependencies:
  flutter:
    sdk: flutter
  speech_to_text: ^7.0.0
  permission_handler: ^11.3.1
  cupertino_icons: ^1.0.2

  # PACOTE PRINCIPAL: faz o reconhecimento de voz
  # Documentação: https://pub.dev/packages/speech_to_text
  #    

  # Ícones extras (a coleção padrão do Flutter)
   

# ── DEPENDÊNCIAS DE DESENVOLVIMENTO ──────────────────────────
# Usadas só durante o desenvolvimento, não vão para o app final
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

# ── CONFIGURAÇÕES DO FLUTTER ──────────────────────────────────
flutter:
  uses-material-design: true
  # Se você quiser adicionar fontes ou imagens customizadas,
  # faz aqui. Por enquanto deixamos padrão.